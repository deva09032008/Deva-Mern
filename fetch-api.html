<html>
<body>
    <h2>Student Data</h2>
    <button onclick="loadData()">load student</button>
    <p id="result"></p>
    <script>
        async function loadData(){
            const response = 
            await fetch(
                "https://jsonplaceholder.typicode.com/users/1"
            );
            console.log(response);

            const data = 
            await response.json();
            console.log(data);

            document.getElementById("result")
            .textContent = 
            "Student Name :" +data.name;
            
            
        }
    </script>
    
</body>
</html>
